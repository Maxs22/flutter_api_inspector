# OpenSpec config for flutter_api_inspector
# Generated by SDD session preflight on 2026-06-23.
#
# This file is the source of truth for SDD phase behavior in this project.
# Edit with care. Re-run /sdd-init only when the stack or testing surface
# changes substantially; otherwise update fields directly.

schema_version: '1.0'

project:
  name: flutter_api_inspector
  description: >-
    Flutter package that lets developers register API endpoints and call them
    with parameters, displaying a debug-only overlay (floating action button
    plus panel) that shows a chronological timeline of calls with details
    (status, duration, request, response).
  repository: flutter_api_inspector
  target: pub.dev
  package_name: flutter_api_inspector

artifact_store:
  mode: openspec # source of truth lives in this repo
  changes_dir: openspec/changes

# --- Session preflight (resolved in this turn) -------------------------------
preflight:
  execution_mode: interactive # pause between major phases for human review
  artifact_store: openspec
  chained_pr_strategy: auto-forecast
  review_budget_lines: 400
  language: en
  artifact_language: en
  conversation_language: en

# --- Stack lock --------------------------------------------------------------
# Decisions already approved by the user. Do not re-litigate these in later
# phase artifacts. Surface a risk and stop if a decision must change.
stack:
  language: dart
  framework: flutter
  package_manager: pub
  manifest: pubspec.yaml
  target_platform: pub.dev
  instrumentation: manual
  # Explicit ApiTrace.call style; no auto-interceptor
  debug_surface:
    type: floating_action_button + overlay_panel
    guarded_by: kDebugMode
    visualization: chronological_timeline_with_tap_to_detail
  minimum_runtime:
    flutter: ">=3.16.0"
    dart: ">=3.2.0"
    android_sdk: ">=21"
    ios_deployment_target: ">=12.0"

# --- Strict TDD --------------------------------------------------------------
# Strict TDD is ON by design. The apply and verify phases will require a
# failing test before any production code is written, and the test runner
# must execute and pass before the task is marked complete.
strict_tdd: true
context: |
  flutter_api_inspector is a brand-new Flutter/Dart package targeting pub.dev.
  It exposes a manual instrumentation API (no auto-interceptor) and a
  debug-only floating action button plus overlay panel. The panel renders a
  chronological timeline of API calls with status, duration, request, and
  response.

  Detected markers: openspec/, .pi/gentle-ai/sdd-preflight.json.
  Package manager: pub (pending pubspec.yaml creation).
  Primary test command: flutter test (configured; awaits pubspec.yaml).
  Unit tests: flutter_test (flutter test).
  Widget tests: flutter_test (flutter test).
  Integration tests: not required for v1 (library package).
  E2E tests: not applicable for a library package.

  Notes for downstream phases:
  - Do not create lib/, test/, or example/ during init.
  - The first sdd-proposal phase owns pubspec.yaml creation.
  - All overlay and timeline behavior is debug-only; the kDebugMode
    guard is mandatory.

rules:
  proposal:
    require_problem_statement: true
  spec:
    require_acceptance_criteria: true
  design:
    require_tradeoffs: true
  tasks:
    protect_review_workload: true
  apply:
    test_command: "flutter test"
    require_test_before_production_code: true
  verify:
    test_command: "flutter test"
    require_red_green_evidence: true

testing:
  detected: 2026-06-23
  runner:
    command: "flutter test"
    framework: "flutter_test"
  layers:
    unit: "flutter_test"
    widget: "flutter_test"
    integration: "not_required_for_v1"
    e2e: "not_applicable"
  commands:
    unit:
      - scope: "."
        command: "flutter test"
        framework: "flutter_test"
    widget:
      - scope: "."
        command: "flutter test"
        framework: "flutter_test widget tests"
    integration: []
    e2e: []
  coverage:
    command: "flutter test --coverage"
    commands:
      - scope: "."
        command: "flutter test --coverage"
        framework: "flutter test coverage"

quality:
  lint: "dart analyze"
  lint_commands:
    - scope: "."
      command: "dart analyze"
      framework: "dart analyze"
  typecheck: "dart analyze"
  typecheck_commands:
    - scope: "."
      command: "dart analyze"
      framework: "dart analyze (includes static type checking)"
  format: "dart format"
  format_commands:
    - scope: "."
      command: "dart format ."
      framework: "dart format"

# --- Active change -----------------------------------------------------------
